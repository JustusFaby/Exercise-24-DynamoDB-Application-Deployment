apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-app
  labels:
    app: customer-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-app
  template:
    metadata:
      labels:
        app: customer-app
    spec:
      serviceAccountName: customer-app-sa
      containers:
      - name: customer-app
        image: 208337080189.dkr.ecr.us-east-1.amazonaws.com/customer-app:latest
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: AWS_REGION
          value: "us-east-1"
        - name: TABLE_NAME
          value: "Customers"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
